name: keysg
channels:
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # pip-only packages
  - pip:
    - --index-url https://pypi.tuna.tsinghua.edu.cn/simple
    - --trusted-host pypi.tuna.tsinghua.edu.cn
    # Core package (installs keysg-build / keysg-vis entry points)

    # torch and related
    #- torch==2.7.1
    #- torchvision==0.22.1
    #- torchaudio==2.7.1

    # 3D / vision
    - open3d
    - opencv-python==4.11.0.86
    - pillow==11.3.0
    - supervision==0.26.1
    - pycocotools
    - numpy==1.26.4        

    # Scene graph & RAG
    - viser
    - faiss-cpu          # swap for faiss-gpu if you have a GPU build
    - open-clip-torch
    - hdbscan
    - shapely
    - scipy
    - scikit-learn

    # Segmentation models
    - git+https://github.com/facebookresearch/segment-anything-2
    - git+https://github.com/xinyu1205/recognize-anything
    - ultralytics          # YOLOWorld / RTDETR
    - transformers==4.57.1  # 5.x has breaking changes with LLMDet/GroundingDINO
    - accelerate

    # LLM / VLM
    - openai
    # - ollama               # optional: local Ollama client

    # Config & logging
    - hydra-core
    - omegaconf
    - loguru
    - pydantic
    - python-dotenv
    - tqdm
